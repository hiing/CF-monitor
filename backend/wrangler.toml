name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "cf-monitor-xugou"
database_id = "0dfbe1d9-9180-468f-b595-01e84a17f57b"

[version_metadata]
binding = "CF_VERSION_METADATA"
